<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapscape - Login/Signup</title>
    <link rel="stylesheet" href="../css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="forms-container">
            <div class="form-wrapper">
                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <img src="../img/LOGO.jpg" alt="Snapscape Logo" class="logo">
                    <h2>LOG IN</h2>
                    <div class="input-group">
                        <input type="text" id="username" required>
                        <label for="username">Username</label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" required>
                        <label for="password">Password</label>
                    </div>
                    <button type="submit" class="btn-primary"> SIGN IN </button>
                    <p class="toggle-text">Don't have an account? <a href="#" onclick="toggleForm('signup')">Sign Up</a></p>
                </form>

                <!-- Signup Form -->
                <form id="signupForm" class="auth-form">
                    <img src="#" alt="Snapscape Logo" class="logo">
                    <h2>Create Account</h2>
                    <div class="name-group">
                        <div class="input-group">
                            <input type="text" id="firstName" required>
                            <label for="firstName">First Name</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="lastName" required>
                            <label for="lastName">Last Name</label>
                        </div>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" required>
                        <label for="email">Email</label>
                    </div>
                    <div class="input-group">
                        <input type="date" id="dob" required>
                        <label for="dob">Date of Birth</label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="signupPassword" required>
                        <label for="signupPassword">Password</label>
                    </div>
                    <button type="submit" class="btn-primary">Create Account</button>
                    <p class="toggle-text">Already have an account? <a href="#" onclick="toggleForm('login')">Sign In</a></p>
                </form>
            </div>
        </div>

        <div class="social-auth">
            <p class="divider">Or continue with</p>
            <div class="social-buttons">
                <a href="#" class="social-btn google">
                    <i class="fab fa-google"></i>
                    Google
                </a>
                <a href="#" class="social-btn facebook">
                    <i class="fab fa-facebook"></i>
                    Facebook
                </a>
                <a href="#" class="social-btn x">
                    <i class="fab fa-twitter"></i>
                    X
                </a>
            </div>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
